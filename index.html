<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지편집 LITE</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Galmuri14';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2506-1@1.0/Galmuri14.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        body {
            font-family: 'Galmuri14', sans-serif;
			line-height: 1.6;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #00b0ff; font-size: 24px; margin-bottom: 10px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 25px; }
        .drop-zone {
            border: 2px dashed #00b0ff;
            padding: 40px 20px;
            border-radius: 8px;
            cursor: pointer;
            background-color: #333344;
            transition: background 0.3s;
            margin-bottom: 20px;
        }
        .drop-zone:hover { background-color: #3d3d55; }
        input[type="file"] { display: none; }
        
        .control-panel {
            background-color: #22222b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .control-group:last-child { margin-bottom: 0; }
        label { font-size: 14px; color: #e0e0e0; font-weight: bold; }
        .checkbox-container { display: flex; align-items: center; cursor: pointer; }
        .checkbox-container input { margin-right: 8px; width: 16px; height: 16px; }
        
        .slider-container { display: flex; align-items: center; width: 60%; }
        .slider-container input { flex-grow: 1; margin-right: 10px; }
        .slider-value { min-width: 30px; text-align: right; font-size: 14px; color: #00b0ff; }

        #result-container {
            margin-top: 30px;
            display: none;
        }
        canvas {
            max-width: 100%;
            border: 1px solid #444;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 6px;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #00e676;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }
        .btn:hover { background-color: #00c853; }
        #status { margin-top: 15px; color: #ffea00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>이미지편집 LITE</h1>
    <p>가볍고 빠른 속도, 로컬에서 이미지 처리. 서버 전송 없음.</p>
    
    <div class="drop-zone" id="dropZone">
        이미지를 드래그 앤 드롭하거나 클릭하여 선택하세요.
        <input type="file" id="fileInput" accept="image/png">
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useRemoveBackground"> 배경색 제거 적용하기
            </label>
        </div>
        <div class="control-group" id="thresholdSliderGroup" style="opacity: 0.5; pointer-events: none;">
            <label for="threshold">임계값 (Threshold):</label>
            <div class="slider-container">
                <input type="range" id="threshold" min="1" max="500" value="50">
                <span class="slider-value" id="thresholdValue">10</span>
            </div>
        </div>
        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useBlur"> 가우시안 블러(Blur) 효과 적용하기
            </label>
        </div>
        <div class="control-group" id="blurSliderGroup" style="opacity: 0.5; pointer-events: none;">
            <label for="blurRadius">블러 강도 (반경픽셀):</label>
            <div class="slider-container">
                <input type="range" id="blurRadius" min="1" max="20" value="3">
                <span class="slider-value" id="blurValue">3px</span>
            </div>
        </div>
        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useInvert"> 색상 반전(Invert Colors) 적용하기
            </label>
        </div>
    </div>

    <button class="btn" id="processBtn" style="background-color: #00b0ff; color: white; display:none; margin-bottom: 15px;">설정 적용하여 다시 처리</button>

    <div id="status"></div>

    <div id="result-container">
        <h3>수정된 이미지 결과 (우클릭 저장 또는 아래 버튼 클릭)</h3>
        <canvas id="canvas"></canvas>
        <br>
        <button class="btn" id="downloadBtn">수정된 이미지 다운로드</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultContainer = document.getElementById('result-container');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    
    const useRemoveBackgroundCheckbox = document.getElementById('useRemoveBackground');
    const thresholdSliderGroup = document.getElementById('thresholdSliderGroup');
    const thresholdSlider = document.getElementById('threshold');
    const thresholdValueLabel = document.getElementById('thresholdValue');
    const useBlurCheckbox = document.getElementById('useBlur');
    const blurSliderGroup = document.getElementById('blurSliderGroup');
    const blurRadiusSlider = document.getElementById('blurRadius');
    const blurValueLabel = document.getElementById('blurValue');
    const useInvertCheckbox = document.getElementById('useInvert');
    const processBtn = document.getElementById('processBtn');

    let currentFile = null;
    let originalImage = null;

    // Threshold 슬라이더 변경 이벤트
    thresholdSlider.addEventListener('input', (e) => {
        thresholdValueLabel.innerText = Math.round(e.target.value * 0.2);
    });

    // 슬라이더 변경 이벤트
    blurRadiusSlider.addEventListener('input', (e) => {
        blurValueLabel.innerText = e.target.value + 'px';
    });

    // 배경색 제거 체크박스 상태 변경 이벤트
    useRemoveBackgroundCheckbox.addEventListener('change', (e) => {
        if (e.target.checked) {
            thresholdSliderGroup.style.opacity = '1';
            thresholdSliderGroup.style.pointerEvents = 'auto';
        } else {
            thresholdSliderGroup.style.opacity = '0.5';
            thresholdSliderGroup.style.pointerEvents = 'none';
        }
    });

    // 체크박스 상태 변경 이벤트
    useBlurCheckbox.addEventListener('change', (e) => {
        if (e.target.checked) {
            blurSliderGroup.style.opacity = '1';
            blurSliderGroup.style.pointerEvents = 'auto';
        } else {
            blurSliderGroup.style.opacity = '0.5';
            blurSliderGroup.style.pointerEvents = 'none';
        }
    });

    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#00e676';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#00b0ff';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#00b0ff';
        const files = e.dataTransfer.files;
        if (files.length > 0) handleFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    processBtn.addEventListener('click', () => {
        if (originalImage) {
            runImageProcessing();
        }
    });

    function handleFile(file) {
        if (file.type !== 'image/png') {
            status.innerText = 'PNG 형식의 이미지만 지원합니다!';
            return;
        }
        currentFile = file;
        status.innerText = '이미지 로드 중...';
        
        const img = new Image();
        img.onload = function() {
            originalImage = img;
            processBtn.style.display = 'inline-block';
            runImageProcessing();
        };
        img.src = URL.createObjectURL(file);
    }

    function runImageProcessing() {
        status.innerText = '이미지 처리 중... 잠시만 기다려주세요.';
        resultContainer.style.display = 'none';

        setTimeout(() => {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);

            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // 1단계: 배경색 제거 (사용자가 체크했을 경우)
            if (useRemoveBackgroundCheckbox.checked) {
                const threshold = parseInt(thresholdSlider.value);
                // 이미지의 첫 번째 픽셀의 색상을 배경색으로 사용
                const targetR = imgData.data[0];
                const targetG = imgData.data[1];
                const targetB = imgData.data[2];
                removeBackground(imgData, targetR, targetG, targetB, threshold);
            }

            // 3단계: 유저가 체크했을 경우 알파 채널을 보존하는 가우시안 블러 수행
            if (useBlurCheckbox.checked) {
                const radius = parseInt(blurRadiusSlider.value);
                imgData = gaussianBlurRGBA(imgData, radius);
            }

            // 4단계: 유저가 체크했을 경우 색상 반전 수행 (알파는 유지)
            if (useInvertCheckbox.checked) {
                invertColors(imgData);
            }

            // 마지막 단계: 검은 테두리를 없애는 알파 블리딩 (항상 마지막에 실행)
            alphaBleed(imgData);

            ctx.putImageData(imgData, 0, 0);
            status.innerText = '처리 완료!';
            resultContainer.style.display = 'block';

            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = 'processed_' + (currentFile ? currentFile.name : 'image.png');
                link.href = canvas.toDataURL();
                link.click();
            };
        }, 50);
    }

    // 배경색 제거 알고리즘
    function removeBackground(imgData, targetR, targetG, targetB, threshold = 30) {
        const width = imgData.width;
        const height = imgData.height;
        const data = imgData.data;

        // 방문 여부를 체크할 배열 (중복 연산 방지)
        const visited = new Uint8Array(width * height);
        
        // 플러드 필을 시작할 좌표들을 담을 큐(Queue)
        const queue = [];

        // 거리 계산 함수 (색상 유사도 체크)
        function isBackground(idx) {
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            const distance = Math.sqrt(
                Math.pow(r - targetR, 2) +
                Math.pow(g - targetG, 2) +
                Math.pow(b - targetB, 2)
            );
            return distance < threshold;
        }

        // [핵심 변경] 네 꼭짓점을 포함한 "이미지의 모든 테두리 4개 면"을 전부 시작점으로 주입
        // 1. 위쪽 & 아래쪽 라인 전체
        for (let x = 0; x < width; x++) {
            // 위쪽 테두리 (y = 0)
            let idx = (0 * width + x) * 4;
            if (isBackground(idx)) { queue.push(x, 0); visited[0 * width + x] = 1; }
            
            // 아래쪽 테두리 (y = height - 1)
            idx = ((height - 1) * width + x) * 4;
            if (isBackground(idx)) { queue.push(x, height - 1); visited[(height - 1) * width + x] = 1; }
        }
        // 2. 왼쪽 & 오른쪽 라인 전체
        for (let y = 0; y < height; y++) {
            // 왼쪽 테두리 (x = 0)
            let idx = (y * width + 0) * 4;
            if (!visited[y * width + 0] && isBackground(idx)) { queue.push(0, y); visited[y * width + 0] = 1; }
            
            // 오른쪽 테두리 (x = width - 1)
            idx = (y * width + (width - 1)) * 4;
            if (!visited[y * width + (width - 1)] && isBackground(idx)) { queue.push(width - 1, y); visited[y * width + (width - 1)] = 1; }
        }

        // 큐가 빌 때까지 사방(상하좌우)으로 퍼져나가며 배경 제거
        let head = 0;
        while (head < queue.length) {
            const cx = queue[head++];
            const cy = queue[head++];
            
            const cIdx = (cy * width + cx) * 4;
            data[cIdx + 3] = 0; // 배경으로 판정된 곳 투명화

            // 상하좌우 인접 픽셀 탐색
            const neighbors = [
                {x: cx, y: cy - 1}, // 상
                {x: cx, y: cy + 1}, // 하
                {x: cx - 1, y: cy}, // 좌
                {x: cx + 1, y: cy}  // 우
            ];

            for (const n of neighbors) {
                if (n.x >= 0 && n.x < width && n.y >= 0 && n.y < height) {
                    const vIdx = n.y * width + n.x;
                    if (!visited[vIdx]) {
                        const nIdx = vIdx * 4;
                        if (isBackground(nIdx)) {
                            visited[vIdx] = 1;
                            queue.push(n.x, n.y);
                        }
                    }
                }
            }
        }

        // [새로운 기능] Color Bleeding: 배경 경계의 반투명 픽셀을 내부 색상으로 채우기
        const isRemoved = new Uint8Array(width * height);
        for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] === 0) {
                isRemoved[i / 4] = 1;
            }
        }

        // 경계의 반투명 픽셀(0 < alpha < 255) 처리
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                const pixelIdx = idx * 4;
                const alpha = data[pixelIdx + 3];

                // 반투명 픽셀이고 제거된 영역 인접 확인
                if (alpha > 0 && alpha < 255) {
                    const neighbors = [
                        {x: x - 1, y: y},
                        {x: x + 1, y: y},
                        {x: x, y: y - 1},
                        {x: x, y: y + 1}
                    ];

                    let nearRemoved = false;
                    for (const n of neighbors) {
                        if (n.x >= 0 && n.x < width && n.y >= 0 && n.y < height) {
                            if (isRemoved[n.y * width + n.x]) {
                                nearRemoved = true;
                                break;
                            }
                        }
                    }

                    // 제거된 영역과 인접하면 가장 가까운 불투명 픽셀의 색상으로 변경
                    if (nearRemoved) {
                        let bestR = 255, bestG = 255, bestB = 255;
                        let bestDist = Infinity;

                        // 5x5 범위에서 완전 불투명 픽셀 찾기
                        for (let dy = -2; dy <= 2; dy++) {
                            for (let dx = -2; dx <= 2; dx++) {
                                const nx = x + dx;
                                const ny = y + dy;
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const nIdx = (ny * width + nx) * 4;
                                    if (data[nIdx + 3] === 255) {
                                        const r = data[nIdx];
                                        const g = data[nIdx + 1];
                                        const b = data[nIdx + 2];
                                        const dist = dx * dx + dy * dy;
                                        if (dist < bestDist) {
                                            bestDist = dist;
                                            bestR = r;
                                            bestG = g;
                                            bestB = b;
                                        }
                                    }
                                }
                            }
                        }

                        // 색상을 내부 색상으로 교체
                        data[pixelIdx] = bestR;
                        data[pixelIdx + 1] = bestG;
                        data[pixelIdx + 2] = bestB;
                    }
                }
            }
        }
    }
    
    // Alpha Bleed 알고리즘 (테두리 검은 선 제거)
    function alphaBleed(imgData) {
			const width = imgData.width;
			const height = imgData.height;
			const data = imgData.data;
			const numPixels = width * height;
			
			const r = new Uint8Array(numPixels);
			const g = new Uint8Array(numPixels);
			const b = new Uint8Array(numPixels);
			const a = new Uint8Array(numPixels);
			
			const visited = new Uint8Array(numPixels);
			const queue = [];
			
			for (let i = 0; i < numPixels; i++) {
				const idx = i * 4;
				r[i] = data[idx];
				g[i] = data[idx + 1];
				b[i] = data[idx + 2];
				a[i] = data[idx + 3];

				// [수정] 조금이라도 색상 정보가 있는 곳(Alpha > 0)은 전부 시작점으로 인정합니다.
				// 이렇게 해야 이미 투명 처리가 되어 있는 PNG 파일도 정상적으로 인식을 시작합니다.
				if (a[i] > 0) {
					visited[i] = 1;
					queue.push(i);
				}
			}

			let head = 0;
			const neighbors = [-width, width, -1, 1];

			while (head < queue.length) {
				const curr = queue[head++];
				const cx = curr % width;
				const cy = Math.floor(curr / width);

				const currR = r[curr];
				const currG = g[curr];
				const currB = b[curr];

				for (const offset of neighbors) {
						const next = curr + offset;
						
					if (next >= 0 && next < numPixels) {
						const nx = next % width;
						const ny = Math.floor(next / width);
						
						if (Math.abs(cx - nx) > 1 || Math.abs(cy - ny) > 1) continue;

						if (!visited[next]) {
							visited[next] = 1;
							
							// 주변의 진짜 색상을 투명 영역에 전염시킵니다.
							r[next] = currR;
							g[next] = currG;
							b[next] = currB;
							
							queue.push(next);
						}
					}
				}
			}

			// 최종 반영
			for (let i = 0; i < numPixels; i++) {
				const idx = i * 4;
				data[idx] = r[i];
				data[idx + 1] = g[i];
				data[idx + 2] = b[i];
				// 원래 투명도(Alpha)는 철저하게 0이나 원래 값 그대로 유지합니다!
			}
		}
		
    function invertColors(imgData) {
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            data[i] = 255 - data[i];
            data[i + 1] = 255 - data[i + 1];
            data[i + 2] = 255 - data[i + 2];
        }
    }

    // 가우시안 블러 알고리즘 (수정본 - 1차원 가우시안 근사 및 좌표 밀림 버그 완전 해결)
    function gaussianBlurRGBA(imgData, radius) {
        const width = imgData.width;
        const height = imgData.height;
        const src = imgData.data;
        
        // ctx.createImageData 대신 크로스브라우징 환경에서 더 안전한 ImageData 객체 생성자 사용
        const targetImgData = new ImageData(new Uint8ClampedArray(src.length), width, height);
        const dst = targetImgData.data;
        
        let tmpData = new Uint8ClampedArray(src);
        let outData = new Uint8ClampedArray(src.length);
        
        const boxes = boxesForGauss(radius, 3);
        
        boxBlur(tmpData, outData, width, height, (boxes[0] - 1) / 2);
        boxBlur(outData, tmpData, width, height, (boxes[1] - 1) / 2);
        boxBlur(tmpData, outData, width, height, (boxes[2] - 1) / 2);
        
        for (let i = 0; i < src.length; i++) {
            dst[i] = outData[i];
        }
        
        return targetImgData;
    }

    function boxesForGauss(sigma, n) {
        const wIdeal = Math.sqrt((12 * sigma * sigma / n) + 1);
        let wl = Math.floor(wIdeal);
        if (wl % 2 === 0) wl--;
        const wu = wl + 2;
        
        const mIdeal = (12 * sigma * sigma - n * wl * wl - 4 * n * wl - 3 * n) / (-4 * wl - 4);
        const m = Math.round(mIdeal);
        
        const sizes = [];
        for (let i = 0; i < n; i++) sizes.push(i < m ? wl : wu);
        return sizes;
    }

    function boxBlur(scl, tcl, w, h, r) {
        for (let i = 0; i < scl.length; i++) tcl[i] = scl[i];
        boxBlurH(tcl, scl, w, h, r);
        boxBlurT(scl, tcl, w, h, r);
    }

    function boxBlurH(scl, tcl, w, h, r) {
        const arr = 1 / (r + r + 1);
        for (let i = 0; i < h; i++) {
            let ti = i * w;
            let li = ti;
            let ri = ti + r;
            
            let fv = scl[ti * 4], fvg = scl[ti * 4 + 1], fvb = scl[ti * 4 + 2], fva = scl[ti * 4 + 3];
            let lv = scl[(ti + w - 1) * 4], lvg = scl[(ti + w - 1) * 4 + 1], lvb = scl[(ti + w - 1) * 4 + 2], lva = scl[(ti + w - 1) * 4 + 3];
            
            let rsum = (r + 1) * fv, gsum = (r + 1) * fvg, bsum = (r + 1) * fvb, asum = (r + 1) * fva;
            
            for (let j = 0; j < r; j++) {
                rsum += scl[(ti + j) * 4];
                gsum += scl[(ti + j) * 4 + 1];
                bsum += scl[(ti + j) * 4 + 2];
                asum += scl[(ti + j) * 4 + 3];
            }
            
            for (let j = 0; j < w; j++) {
                rsum += scl[ri * 4] - fv;
                gsum += scl[ri * 4 + 1] - fvg;
                bsum += scl[ri * 4 + 2] - fvb;
                asum += scl[ri * 4 + 3] - fva;
                
                tcl[ti * 4] = Math.round(rsum * arr);
                tcl[ti * 4 + 1] = Math.round(gsum * arr);
                tcl[ti * 4 + 2] = Math.round(bsum * arr);
                tcl[ti * 4 + 3] = Math.round(asum * arr);
                
                if (j >= r) { fv = scl[li * 4]; fvg = scl[li * 4 + 1]; fvb = scl[li * 4 + 2]; fva = scl[li * 4 + 3]; li++; }
                if (ri < (i * w + w - 1)) ri++; else { fv = lv; fvg = lvg; fvb = lvb; fva = lva; }
                ti++;
            }
        }
    }

    function boxBlurT(scl, tcl, w, h, r) {
        const arr = 1 / (r + r + 1);
        for (let i = 0; i < w; i++) {
            let ti = i;
            let li = ti;

            let fv = scl[ti * 4], fvg = scl[ti * 4 + 1], fvb = scl[ti * 4 + 2], fva = scl[ti * 4 + 3];
            let lv = scl[(ti + (h - 1) * w) * 4], lvg = scl[(ti + (h - 1) * w) * 4 + 1], lvb = scl[(ti + (h - 1) * w) * 4 + 2], lva = scl[(ti + (h - 1) * w) * 4 + 3];
            
            let rsum = (r + 1) * fv, gsum = (r + 1) * fvg, bsum = (r + 1) * fvb, asum = (r + 1) * fva;
            
            for (let j = 0; j < r; j++) {
                rsum += scl[(ti + j * w) * 4];

                bsum += scl[(ti + j * w) * 4 + 2];
                asum += scl[(ti + j * w) * 4 + 3];
            }
            
            for (let j = 0; j < h; j++) {
                tcl[ti * 4] = Math.round(rsum * arr);
                tcl[ti * 4 + 1] = Math.round(gsum * arr);
                tcl[ti * 4 + 2] = Math.round(bsum * arr);
                tcl[ti * 4 + 3] = Math.round(asum * arr);
                
                rsum += scl[ri * 4] - fv;
                gsum += scl[ri * 4 + 1] - fvg;
                bsum += scl[ri * 4 + 2] - fvb;
                asum += scl[ri * 4 + 3] - fva;
                
                if (j >= r) { fv = scl[li * 4]; fvg = scl[li * 4 + 1]; fvb = scl[li * 4 + 2]; fva = scl[li * 4 + 3]; li += w; }
                if (ri < (i + (h - 1) * w)) ri += w; else { fv = lv; fvg = lvg; fvb = lvb; fva = lva; }
