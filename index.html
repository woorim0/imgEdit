<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지편집 LITE</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Galmuri14';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2506-1@1.0/Galmuri14.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        body {
            font-family: 'Galmuri14', sans-serif;
            line-height: 1.6;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #00b0ff; font-size: 24px; margin-bottom: 10px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 25px; }
        .drop-zone {
            border: 2px dashed #00b0ff;
            padding: 40px 20px;
            border-radius: 8px;
            cursor: pointer;
            background-color: #333344;
            transition: background 0.3s;
            margin-bottom: 20px;
        }
        .drop-zone:hover { background-color: #3d3d55; }
        input[type="file"] { display: none; }
        
        .control-panel {
            background-color: #22222b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
				.control-group label {
					white-space: nowrap; /* 글자가 아래로 꺾이지 않도록 강제 */
					flex-shrink: 0;      /* flex 레이아웃 안에서 label이 찌그러지는 것을 방지 */
					min-width: 45px;     /* '배경:' 텍스트가 들어갈 최소 공간 확보 (필요시 조절) */
				}
        label { font-size: 14px; color: #e0e0e0; font-weight: bold; }
        .checkbox-container { display: flex; align-items: center; cursor: pointer; }
        .checkbox-container input { margin-right: 8px; width: 16px; height: 16px; }
        .checkbox-container input:disabled { opacity: 0.45; cursor: not-allowed; }
        .checkbox-label-text { color: #e0e0e0; }
        .checkbox-container input:disabled + .checkbox-label-text { color: #777; }
        .control-group select { width: 100%; padding: 8px 10px; border-radius: 5px; border: 1px solid #444; background-color: #1d1d27; color: #fff; }
        .slider-container { display: flex; align-items: center; width: 60%; }
        .slider-container input { flex-grow: 1; margin-right: 10px; }
        .slider-value { min-width: 30px; text-align: right; font-size: 14px; color: #00b0ff; }
        #result-container { margin-top: 30px; display: none; }
        canvas {
					max-width: 100%;
					border: 1px solid #444;
					background-color: transparent;
					background-image: conic-gradient(#111 25%, transparent 25% 50%, #111 50% 75%, transparent 75%);
					background-size: 20px 20px;
					border-radius: 6px;
        }
        canvas.whiteChecker {
					background-color: #fff;
					background-image: conic-gradient(#ddd 25%, transparent 25% 50%, #ddd 50% 75%, transparent 75%);
					background-size: 20px 20px;
				}
        canvas.black { background-image: none; background-color: #000; }
        canvas.white { background-image: none; background-color: #fff; }
        canvas.green { background-image: none; background-color: #00c853; }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #00e676;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }
        .btn:hover { background-color: #00c853; }
        #status { margin-top: 15px; color: #ffea00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>이미지편집 LITE</h1>
    <p>가볍고 빠른 속도, 로컬에서 이미지 처리. 서버 전송 없음.</p>
    
    <div class="drop-zone" id="dropZone">
        이미지를 드래그 앤 드롭하거나 클릭하여 선택하세요.
        <input type="file" id="fileInput" accept="image/png">
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useRemoveBackground"> 배경색 제거 적용하기
            </label>
        </div>
        <div class="control-group" id="singleColorLogoGroup" style="margin: -10px 0 12px 20px; pointer-events: none;">
            <label class="checkbox-container">
                <input type="checkbox" id="useSingleColorLogoMode" disabled>
                <span class="checkbox-label-text">단일 색 로고 모드</span>
            </label>
        </div>
        <div class="control-group" id="thresholdSliderGroup" style="opacity: 0.5; pointer-events: none; margin-bottom: 20px;">
            <label for="threshold">배경 임계값 (Threshold):</label>
            <div class="slider-container">
                <input type="range" id="threshold" min="1" max="500" value="50">
                <span class="slider-value" id="thresholdValue">10</span>
            </div>
        </div>
        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useRemoveBackgroundStrong" disabled>
                <span class="checkbox-label-text">배경색 제거 강화</span>
            </label>
        </div>

        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useGaussianBlur"> 가우시안 블러 적용하기
            </label>
        </div>
        <div class="control-group" id="blurSliderGroup" style="opacity: 0.5; pointer-events: none; margin-bottom: 20px;">
            <label for="blurRadius">블러 반지름 (Radius):</label>
            <div class="slider-container">
                <input type="range" id="blurRadius" min="1" max="20" value="5">
                <span class="slider-value" id="blurValue">5</span>
            </div>
        </div>

        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="useInvert"> 색상 반전 (Invert) 적용하기
            </label>
        </div>
    </div>
		<div class="control-group">
				<label for="previewBackground">배경:</label>
				<select id="previewBackground">
						<option value="blackChecker">검은 체크무늬</option>
						<option value="whiteChecker">흰 체크무늬</option>
						<option value="black">검은색</option>
						<option value="white">흰색</option>
						<option value="green">초록색</option>
				</select>
		</div>

    <button class="btn" id="processBtn" style="background-color: #00b0ff; color: white; display:none; margin-bottom: 15px;">설정 적용하여 다시 처리</button>

    <div id="status"></div>

    <div id="result-container">
        <h3>수정된 이미지 결과</h3>
        <canvas id="canvas"></canvas>
        <br>
        <button class="btn" id="downloadBtn">수정된 이미지 다운로드</button>
    </div>
</div>

<script>
    // --- 1. 수동 PNG 인코더 모듈 (브라우저 최적화 우회용) ---
    (function (globalObj) {
        'use strict';
        var DEFLATE_METHOD = String.fromCharCode(0x78, 0x01),
            CRC_TABLE = [],
            SIGNATURE = String.fromCharCode(137, 80, 78, 71, 13, 10, 26, 10),
            NO_FILTER = String.fromCharCode(0),
            make_crc_table = function () {
                var n, c, k;
                for (n = 0; n < 256; n++) {
                    c = n;
                    for (k = 0; k < 8; k++) {
                        if (c & 1) c = 0xedb88320 ^ (c >>> 1);
                        else c = c >>> 1;
                    }
                    CRC_TABLE[n] = c;
                }
            },
            inflateStore = function (data) {
                var MAX_STORE_LENGTH = 65535, storeBuffer = '', i, remaining, blockType;
                for (i = 0; i < data.length; i += MAX_STORE_LENGTH) {
                    remaining = data.length - i;
                    if (remaining <= MAX_STORE_LENGTH) blockType = String.fromCharCode(0x01);
                    else { remaining = MAX_STORE_LENGTH; blockType = String.fromCharCode(0x00); }
                    storeBuffer += blockType + String.fromCharCode((remaining & 0xFF), (remaining & 0xFF00) >>> 8);
                    storeBuffer += String.fromCharCode(((~remaining) & 0xFF), ((~remaining) & 0xFF00) >>> 8);
                    storeBuffer += data.substring(i, i + remaining);
                }
                return storeBuffer;
            },
            adler32 = function (data) {
                var MOD_ADLER = 65521, a = 1, b = 0, i;
                for (i = 0; i < data.length; i++) {
                    a = (a + data.charCodeAt(i)) % MOD_ADLER;
                    b = (b + a) % MOD_ADLER;
                }
                return (b << 16) | a;
            },
            update_crc = function (crc, buf) {
                var c = crc, n, b;
                for (n = 0; n < buf.length; n++) {
                    b = buf.charCodeAt(n);
                    c = CRC_TABLE[(c ^ b) & 0xff] ^ (c >>> 8);
                }
                return c;
            },
            crc = function crc(buf) { return update_crc(0xffffffff, buf) ^ 0xffffffff; },
            dwordAsString = function (dword) {
                return String.fromCharCode((dword & 0xFF000000) >>> 24, (dword & 0x00FF0000) >>> 16, (dword & 0x0000FF00) >>> 8, (dword & 0x000000FF));
            },
            createChunk = function (length, type, data) {
                var CRC = crc(type + data);
                return dwordAsString(length) + type + data + dwordAsString(CRC);
            },
            IEND,
            createIHDR = function (width, height) {
                var IHDRdata = dwordAsString(width) + dwordAsString(height);
                IHDRdata += String.fromCharCode(8) + String.fromCharCode(6) + String.fromCharCode(0) + String.fromCharCode(0) + String.fromCharCode(0);
                return createChunk(13, 'IHDR', IHDRdata);
            },
            png = function (width, height, rgba) {
                var IHDR = createIHDR(width, height), IDAT, scanlines = '', scanline, y, x, compressedScanlines;
                for (y = 0; y < rgba.length; y += width * 4) {
                    scanline = NO_FILTER;
                    if (Array.isArray(rgba)) {
                        for (x = 0; x < width * 4; x++) scanline += String.fromCharCode(rgba[y + x] & 0xff);
                    } else {
                        scanline += rgba.substr(y, width * 4);
                    }
                    scanlines += scanline;
                }
                compressedScanlines = DEFLATE_METHOD + inflateStore(scanlines) + dwordAsString(adler32(scanlines));
                IDAT = createChunk(compressedScanlines.length, 'IDAT', compressedScanlines);
                return SIGNATURE + IHDR + IDAT + IEND;
            };
        make_crc_table();
        IEND = createChunk(0, 'IEND', '');
        globalObj.generatePng = png;
    }(window));

    function rawImageDataToString(data) {
        let s = "";
        const chunk = 8192;
        for (let i = 0; i < data.length; i += chunk) {
            s += String.fromCharCode.apply(null, data.subarray(i, i + chunk));
        }
        return s;
    }

    // --- 2. 메인 로직 및 UI 인터랙션 ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true, alpha: true });
    const resultContainer = document.getElementById('result-container');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const processBtn = document.getElementById('processBtn');
    const previewBackground = document.getElementById('previewBackground');
    
    let currentFile = null;
    let originalImage = null;

    document.getElementById('threshold').addEventListener('input', (e) => {
        document.getElementById('thresholdValue').innerText = Math.round(e.target.value * 0.2);
    });
    document.getElementById('blurRadius').addEventListener('input', (e) => {
        document.getElementById('blurValue').innerText = e.target.value;
    });

    // 배경색 제거 체크박스 이벤트
    document.getElementById('useRemoveBackground').addEventListener('change', (e) => {
        const thresholdSliderGroup = document.getElementById('thresholdSliderGroup');
        const singleColorLogoGroup = document.getElementById('singleColorLogoGroup');
        const singleColorLogoMode = document.getElementById('useSingleColorLogoMode');
        const strongBackgroundRemove = document.getElementById('useRemoveBackgroundStrong');

        thresholdSliderGroup.style.opacity = e.target.checked ? '1' : '0.5';
        thresholdSliderGroup.style.pointerEvents = e.target.checked ? 'auto' : 'none';
        singleColorLogoGroup.style.pointerEvents = e.target.checked ? 'auto' : 'none';
        strongBackgroundRemove.disabled = !e.target.checked;
        singleColorLogoMode.disabled = !e.target.checked;

        if (!e.target.checked) {
            strongBackgroundRemove.checked = false;
            singleColorLogoMode.checked = false;
        }
    });

    // 가우시안 블러 체크박스 이벤트 추가
    document.getElementById('useGaussianBlur').addEventListener('change', (e) => {
        document.getElementById('blurSliderGroup').style.opacity = e.target.checked ? '1' : '0.5';
        document.getElementById('blurSliderGroup').style.pointerEvents = e.target.checked ? 'auto' : 'none';
    });

    previewBackground.addEventListener('change', () => updateCanvasPreviewBackground());

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#00e676'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#00b0ff'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.style.borderColor = '#00b0ff';
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
    processBtn.addEventListener('click', () => { if (originalImage) runImageProcessing(); });

    function handleFile(file) {
        if (file.type !== 'image/png') { status.innerText = 'PNG 형식만 지원합니다!'; return; }
        currentFile = file;
        status.innerText = '이미지 로드 중...';
        const img = new Image();
        img.onload = function() {
            originalImage = img;
            processBtn.style.display = 'inline-block';
            runImageProcessing();
        };
        img.src = URL.createObjectURL(file);
    }

    function runImageProcessing() {
        status.innerText = '이미지 처리 중... 잠시만 기다려주세요.';
        resultContainer.style.display = 'none';

        setTimeout(() => {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);

            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // [1단계] 배경색 제거
            if (document.getElementById('useRemoveBackground').checked) {
                const threshold = parseInt(document.getElementById('threshold').value);
                const strongBackgroundRemove = document.getElementById('useRemoveBackgroundStrong').checked;
                const singleColorLogoMode = document.getElementById('useSingleColorLogoMode').checked;
                removeBackground(imgData, imgData.data[0], imgData.data[1], imgData.data[2], threshold, strongBackgroundRemove, singleColorLogoMode);
            }

            // [2단계] 가우시안 블러 효과 적용 (체크박스가 켜진 경우에만 실행)
            if (document.getElementById('useGaussianBlur').checked) {
                const blurRadius = parseInt(document.getElementById('blurRadius').value);
                if (blurRadius > 0) {
                    applyGaussianBlur(imgData, blurRadius);
                }
            }

            // [3단계] 색상 반전 (Invert) 적용
            if (document.getElementById('useInvert').checked) {
                applyInvert(imgData);
            }

            // [4단계] 알파 블리딩 (테두리 찌꺼기 픽스)
            alphaBleed(imgData);

            // 처리된 데이터를 시각적 화면 렌더링용으로 캔버스에 출력
            ctx.putImageData(imgData, 0, 0);
            
            // 수동 PNG 인코더로 브라우저의 무손실 물리 데이터 백업 생성
            const datBase64 = btoa(window.generatePng(canvas.width, canvas.height, rawImageDataToString(imgData.data)));

            status.innerText = '처리 완료!';
            resultContainer.style.display = 'block';
            updateCanvasPreviewBackground();

            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = 'processed_' + (currentFile ? currentFile.name : 'image.png');
                link.href = "data:image/png;base64," + datBase64;
                link.click();
            };
        }, 50);
    }

    // --- 3. 이미지 필터 함수들 ---

    // 배경 제거 알고리즘 + 단일 색 로고 보정
    function removeBackground(imgData, targetR, targetG, targetB, threshold, strong, singleColorLogoMode) {
        const width = imgData.width, height = imgData.height, data = imgData.data;

        function isBackground(idx) {
            const r = data[idx], g = data[idx + 1], b = data[idx + 2];
            return Math.sqrt(Math.pow(r - targetR, 2) + Math.pow(g - targetG, 2) + Math.pow(b - targetB, 2)) < threshold;
        }

        const visited = new Uint8Array(width * height);
        const queue = [];

        for (let x = 0; x < width; x++) {
            let idx = (0 * width + x) * 4;
            if (isBackground(idx)) { queue.push(x, 0); visited[x] = 1; }
            idx = ((height - 1) * width + x) * 4;
            if (isBackground(idx)) { queue.push(x, height - 1); visited[(height - 1) * width + x] = 1; }
        }
        for (let y = 0; y < height; y++) {
            let idx = (y * width + 0) * 4;
            if (!visited[y * width + 0] && isBackground(idx)) { queue.push(0, y); visited[y * width + 0] = 1; }
            idx = (y * width + (width - 1)) * 4;
            if (!visited[y * width + (width - 1)] && isBackground(idx)) { queue.push(width - 1, y); visited[y * width + (width - 1)] = 1; }
        }

        let head = 0;
        const neighbors = [{x: 0, y: -1}, {x: 0, y: 1}, {x: -1, y: 0}, {x: 1, y: 0}];
        while (head < queue.length) {
            const cx = queue[head++], cy = queue[head++];
            data[(cy * width + cx) * 4 + 3] = 0;

            for (const n of neighbors) {
                const nx = cx + n.x, ny = cy + n.y;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                    const vIdx = ny * width + nx;
                    if (!visited[vIdx] && isBackground(vIdx * 4)) {
                        visited[vIdx] = 1;
                        queue.push(nx, ny);
                    }
                }
            }
        }

        if (strong) {
            for (let idx = 0; idx < data.length; idx += 4) {
                if (isBackground(idx)) {
                    data[idx + 3] = 0;
                }
            }
        }

        if (singleColorLogoMode) {
            const colorCounts = new Map();
            for (let idx = 0; idx < data.length; idx += 4) {
                if (data[idx + 3] <= 0) continue;
                const key = `${data[idx]},${data[idx + 1]},${data[idx + 2]}`;
                colorCounts.set(key, (colorCounts.get(key) || 0) + 1);
            }

            let dominantKey = null;
            let dominantCount = -1;
            colorCounts.forEach((count, key) => {
                if (count > dominantCount) {
                    dominantCount = count;
                    dominantKey = key;
                }
            });

            if (dominantKey) {
                const [dominantR, dominantG, dominantB] = dominantKey.split(',').map(Number);
                for (let idx = 0; idx < data.length; idx += 4) {
                    if (data[idx + 3] <= 0) continue;
                    data[idx] = dominantR;
                    data[idx + 1] = dominantG;
                    data[idx + 2] = dominantB;
                }
            }
        }
    }

    // 가우시안 블러 알고리즘 (알파 채널 보존형)
    function applyGaussianBlur(imgData, radius) {
        const data = imgData.data;
        const width = imgData.width;
        const height = imgData.height;
        const tmp = new Uint8ClampedArray(data.length);
        
        // 가우시안 커널 생성
        const rs = Math.ceil(radius * 2.57);
        const kernel = [];
        let kernelSum = 0;
        for (let i = -radius; i <= radius; i++) {
            const g = Math.exp(-(i * i) / (2 * radius * radius));
            kernel.push(g);
            kernelSum += g;
        }
        for (let i = 0; i < kernel.length; i++) kernel[i] /= kernelSum;

        // 수평 블러
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                let r = 0, g = 0, b = 0, a = 0;
                for (let k = -radius; k <= radius; k++) {
                    const kx = Math.min(width - 1, Math.max(0, x + k));
                    const idx = (y * width + kx) * 4;
                    const weight = kernel[k + radius];
                    r += data[idx] * weight;
                    g += data[idx + 1] * weight;
                    b += data[idx + 2] * weight;
                    a += data[idx + 3] * weight;
                }
                const tidx = (y * width + x) * 4;
                tmp[tidx] = r; tmp[tidx + 1] = g; tmp[tidx + 2] = b; tmp[tidx + 3] = a;
            }
        }

        // 수직 블러 및 원본 복사
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                let r = 0, g = 0, b = 0, a = 0;
                for (let k = -radius; k <= radius; k++) {
                    const ky = Math.min(height - 1, Math.max(0, y + k));
                    const idx = (ky * width + x) * 4;
                    const weight = kernel[k + radius];
                    r += tmp[idx] * weight;
                    g += tmp[idx + 1] * weight;
                    b += tmp[idx + 2] * weight;
                    a += tmp[idx + 3] * weight;
                }
                const oidx = (y * width + x) * 4;
                data[oidx] = r; data[oidx + 1] = g; data[oidx + 2] = b; data[oidx + 3] = a;
            }
        }
    }

    // 색상 반전 알고리즘 (RGB 채널만 뒤집고 알파는 유지)
    function applyInvert(imgData) {
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            data[i]     = 255 - data[i];     // R
            data[i + 1] = 255 - data[i + 1]; // G
            data[i + 2] = 255 - data[i + 2]; // B
        }
    }

    function updateCanvasPreviewBackground() {
        const selected = previewBackground.value;
        canvas.className = '';
        switch (selected) {
            case 'blackChecker':
                // default checker background when no extra class is set
                break;
            case 'whiteChecker':
                canvas.classList.add('whiteChecker');
                break;
            case 'black':
                canvas.classList.add('black');
                break;
            case 'white':
                canvas.classList.add('white');
                break;
            case 'green':
                canvas.classList.add('green');
                break;
        }
    }
    
    // 알파 블리딩 (테두리 픽셀픽스 알고리즘)
    function alphaBleed(imgData) {
        const width = imgData.width, height = imgData.height, data = imgData.data;
        const numPixels = width * height;
        const opaque = new Int8Array(numPixels);
        const loose = new Uint8Array(numPixels);
        let pending = [], pendingNext = [];
        const offsets = [
            {dx: -1, dy: -1}, {dx: 0, dy: -1}, {dx: 1, dy: -1},
            {dx: -1, dy:  0},                  {dx: 1, dy:  0},
            {dx: -1, dy:  1}, {dx: 0, dy:  1}, {dx: 1, dy:  1}
        ];

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const i = y * width + x;
                const alpha = data[i * 4 + 3];

                if (alpha <= 15) {
                    data[i * 4 + 3] = 0; 
                    let isLoose = true;
                    for (let k = 0; k < 8; k++) {
                        const nX = x + offsets[k].dx, nY = y + offsets[k].dy;
                        if (nX >= 0 && nX < width && nY >= 0 && nY < height) {
                            if (data[(nY * width + nX) * 4 + 3] > 15) { 
                                isLoose = false;
                                break;
                            }
                        }
                    }
                    if (!isLoose) pending.push(i);
                    else loose[i] = 1;
                } else {
                    opaque[i] = -1; 
                }
            }
        }

        while (pending.length > 0) {
            pendingNext = [];
            for (let p = 0; p < pending.length; p++) {
                const i = pending[p], x = i % width, y = Math.floor(i / width);
                let rSum = 0, gSum = 0, bSum = 0, count = 0;

                for (let k = 0; k < 8; k++) {
                    const nX = x + offsets[k].dx, nY = y + offsets[k].dy;
                    if (nX >= 0 && nX < width && nY >= 0 && nY < height) {
                        const nI = nY * width + nX;
                        if (opaque[nI] & 1) { 
                            const nIdx = nI * 4;
                            rSum += data[nIdx]; gSum += data[nIdx + 1]; bSum += data[nIdx + 2];
                            count++;
                        }
                    }
                }

                if (count > 0) {
                    const idx = i * 4;
                    data[idx] = Math.round(rSum / count);
                    data[idx + 1] = Math.round(gSum / count);
                    data[idx + 2] = Math.round(bSum / count);
                    
                    opaque[i] = 0xFE; 

                    for (let k = 0; k < 8; k++) {
                        const nX = x + offsets[k].dx, nY = y + offsets[k].dy;
                        if (nX >= 0 && nX < width && nY >= 0 && nY < height) {
                            const nI = nY * width + nX;
                            if (loose[nI]) {
                                pendingNext.push(nI);
                                loose[nI] = 0;
                            }
                        }
                    }
                } else {
                    pendingNext.push(i);
                }
            }

            if (pendingNext.length > 0) {
                for (let p = 0; p < pending.length; p++) opaque[pending[p]] >>= 1; 
            }
            pending = pendingNext;
        }
    }
